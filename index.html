<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escursioni — Davide</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet GPX plugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.2/gpx.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f1114;
      --surface: #181b20;
      --surface-hover: #22262d;
      --border: #2a2e36;
      --text: #e8e6e1;
      --text-muted: #8a8d93;
      --accent: #e8a838;
      --accent-dim: rgba(232,168,56,0.15);
      --trail-color: #ff5533;
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app { display: flex; height: 100vh; }

    .sidebar {
      width: 380px; min-width: 380px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800; font-size: 1.75rem;
      letter-spacing: -0.02em; color: var(--text);
      margin-bottom: 4px;
    }

    .sidebar-header .subtitle {
      font-size: 0.8rem; color: var(--text-muted);
      font-weight: 300; letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .trail-count {
      display: inline-block;
      background: var(--accent-dim); color: var(--accent);
      font-size: 0.7rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      margin-left: 8px; vertical-align: middle;
    }

    .sidebar-search {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-search input {
      width: 100%; padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text); font-family: inherit;
      font-size: 0.85rem; outline: none;
      transition: border-color 0.2s;
    }

    .sidebar-search input::placeholder { color: var(--text-muted); }
    .sidebar-search input:focus { border-color: var(--accent); }

    .trail-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .trail-list::-webkit-scrollbar { width: 4px; }
    .trail-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .trail-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 12px; border-radius: var(--radius);
      cursor: pointer; transition: background 0.2s;
      border-left: 3px solid transparent;
    }

    .trail-item:hover, .trail-item.active { background: var(--surface-hover); }
    .trail-item.active { border-left: 3px solid var(--accent); }

    .trail-color-dot {
      width: 12px; height: 12px; border-radius: 50%;
      margin-top: 5px; flex-shrink: 0;
    }

    .trail-info h3 { font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }

    .trail-meta {
      display: flex; gap: 14px; font-size: 0.72rem;
      color: var(--text-muted); font-weight: 300;
    }

    .trail-meta span { display: flex; align-items: center; gap: 4px; }

    .sidebar-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      font-size: 0.7rem; color: var(--text-muted);
      text-align: center; font-weight: 300;
    }

    .sidebar-footer a { color: var(--accent); text-decoration: none; }

    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    .leaflet-popup-content-wrapper {
      background: var(--surface) !important; color: var(--text) !important;
      border-radius: var(--radius) !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
      font-family: 'DM Sans', sans-serif !important;
    }

    .leaflet-popup-tip { background: var(--surface) !important; border: 1px solid var(--border) !important; }
    .leaflet-popup-content { margin: 14px 16px !important; font-size: 0.85rem !important; }

    .popup-title {
      font-family: 'Playfair Display', serif;
      font-weight: 600; font-size: 1rem; margin-bottom: 8px;
    }

    .popup-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px 16px; font-size: 0.78rem;
    }

    .popup-stats dt { color: var(--text-muted); font-weight: 300; }
    .popup-stats dd { font-weight: 500; color: var(--accent); }

    .sidebar-toggle {
      display: none; position: fixed; top: 16px; left: 16px;
      z-index: 1100; width: 44px; height: 44px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 1.3rem; cursor: pointer;
      align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .elevation-panel {
      display: none; position: fixed; bottom: 0;
      left: 380px; right: 0; height: 180px;
      background: var(--surface); border-top: 1px solid var(--border);
      z-index: 900; padding: 12px 20px;
    }

    .elevation-panel.visible { display: block; }
    .elevation-panel canvas { width: 100%; height: 100%; }

    .elevation-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }

    .elevation-header span {
      font-size: 0.75rem; color: var(--text-muted);
      font-weight: 300; text-transform: uppercase; letter-spacing: 0.06em;
    }

    .elevation-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1rem; }

    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s;
    }

    .loading-overlay.hidden { opacity: 0; pointer-events: none; }

    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.85rem; color: var(--text-muted); font-weight: 300; }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        box-shadow: 8px 0 30px rgba(0,0,0,0.5);
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-toggle { display: flex; }
      .elevation-panel { left: 0; }
    }

    @media (max-width: 480px) { .sidebar { width: 100%; min-width: 100%; } }

    /* Hide any marker images the GPX plugin injects */
    .leaflet-marker-icon.leaflet-zoom-animated,
    .leaflet-marker-shadow.leaflet-zoom-animated {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loader">
    <div class="loading-spinner"></div>
    <div class="loading-text">Caricamento tracce…</div>
  </div>

  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Escursioni <span class="trail-count" id="trailCount">0</span></h1>
        <div class="subtitle">Le mie tracce GPX</div>
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="Cerca escursione…" id="searchInput" />
      </div>
      <div class="trail-list" id="trailList"></div>
      <div class="sidebar-footer">
        Powered by <a href="https://leafletjs.com" target="_blank">Leaflet</a> &amp; <a href="https://stadiamaps.com" target="_blank">Stadia Maps</a>
      </div>
    </aside>

    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <div class="elevation-panel" id="elevationPanel">
    <div class="elevation-header">
      <span>Profilo altimetrico</span>
      <button class="elevation-close" id="elevationClose">✕</button>
    </div>
    <canvas id="elevationCanvas"></canvas>
  </div>

  <script>
  // =================================================================
  //  CONFIGURATION — Add your GPX files here!
  // =================================================================
  //
  //  To add a new hike, simply:
  //  1. Drop your .gpx file into the "gpx/" folder
  //  2. Add an entry below with:
  //       - file:  path to your GPX file
  //       - name:  display name (optional — will use GPX metadata if blank)
  //       - color: trail color on the map (optional — auto-assigned if blank)
  //       - date:  date of the hike (optional)
  //       - group: who you went with (optional)
  //
  //  Example:
  //    { file: "gpx/my-hike.gpx", name: "Monte Grappa", color: "#22cc88", date: "15 Mar 2024", group: "Con Marco e Luca" }
  //
  var TRAILS = [
    { file: "gpx/Waihee_Ridge_Trail.gpx", name: "Waihee Ridge trail", color: "#eee600", date: "04/01/2026", group: "Federica" },
    { file: "gpx/Keoneheehee_Trail.gpx", name: "Keonehe'ehe'e trail", color: "#eee600", date: "01/01/2026", group: "Federica" },
    { file: "gpx/Waimoko_Falls_Trail.gpx", name: "Waimoko Falls Trail", color: "#eee600", date: "31/12/2025", group: "Federica" },
    { file: "gpx/Viaz_dei_Cengioni.gpx", name: "Viaz dei Cengioni", color: "#eee600", date: "14/09/2025/2025", group: "Federica, Claudia, Davide" },
    { file: "gpx/Rifugio_Bottari.gpx", name: "Rifugio Bottari e quasi Passo Venegiota", color: "#eee600", date: "13/09/2025", group: "Frezza, Chiara" },
    { file: "gpx/Alta_Via_Dolomiti_Bellunesi_2.gpx", name: "Alta Via Dolomiti Bellunesi - Parte 2", color: "#eee600", date: "7-8-9/09/2025", group: "Federica" },
    { file: "gpx/Giro_Cime_Centenere.gpx", name: "Giro Cime Centenere", color: "#eee600", date: "01(09/2025", group: "Federica, Silvia" },
    { file: "gpx/Bivacco_del_Torso_Monte_Cimone.gpx", name: "Bivacco Del Torso e quasi Monte Cimone", color: "#eee600", date: "12-13/06/2025", group: "Federica" },
    { file: "gpx/Forcella_Caoz.gpx", name: "Forcella Caoz", color: "#eee600", date: "XX/06/2025", group: "Frezza, Chiara" },
    { file: "gpx/Alta_Via_Dolomiti_Bellunesi_1.gpx", name: "Alta Via Dolomiti Bellunesi - Parte 1", color: "#eee600", date: "7-8-9/06/2025", group: "Federica" },
    { file: "gpx/Monte_Vettore.gpx", name: "Monte Vettore", color: "#eee600", date: "28/05/2025", group: "Federica" },
    { file: "gpx/Bivacco_Vaccari.gpx", name: "Bivacco Vaccari", color: "#eee600", date: "19-20/05/2025", group: "in solitaria" },
    { file: "gpx/Quasi_Bivacco_Valdo.gpx", name: "Bivacco Valdo (quasi)", color: "#eee600", date: "17/05/2025", group: "Federica, Claudia, Davide" },
    { file: "gpx/Casera_Pramaggiore.gpx", name: "Casera Pramaggiore", color: "#eee600", date: "10/05/2025", group: "Federica, Silvia, Paola, Eddi" },
    // { file: "gpx/.gpx", name: "", color: "#eee600", date: "/2025", group: "" },
  ];

  var PALETTE = [
    "#ff5533", "#33bbff", "#44dd66", "#ffaa22", "#dd44ff",
    "#ff6699", "#22ddcc", "#ff3366", "#88aaff", "#ccdd33",
    "#ff8844", "#6677ff", "#33ff99", "#ff4488", "#aaddff",
  ];

  (function() {
    var map = L.map('map', { center: [46.4, 12.4], zoom: 9, zoomControl: false });

    L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_satellite/{z}/{x}/{y}{r}.jpg', {
      maxZoom: 20,
      attribution:
        '&copy; CNES, Distribution Airbus DS, &copy; Airbus DS, &copy; PlanetObserver (Contains Copernicus Data) ' +
        '| &copy; <a href="https://stadiamaps.com/">Stadia Maps</a> ' +
        '&copy; <a href="https://openmaptiles.org/">OpenMapTiles</a> ' +
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    }).addTo(map);

    L.control.zoom({ position: 'topright' }).addTo(map);

    var layers = [];
    var activeIndex = -1;

    var trailListEl = document.getElementById('trailList');
    var trailCountEl = document.getElementById('trailCount');
    var searchInput = document.getElementById('searchInput');
    var loader = document.getElementById('loader');
    var sidebarToggle = document.getElementById('sidebarToggle');
    var sidebar = document.getElementById('sidebar');
    var elevPanel = document.getElementById('elevationPanel');
    var elevCanvas = document.getElementById('elevationCanvas');
    var elevClose = document.getElementById('elevationClose');

    sidebarToggle.addEventListener('click', function() { sidebar.classList.toggle('open'); });

    var loaded = 0;

    if (TRAILS.length === 0) {
      loader.classList.add('hidden');
      trailCountEl.textContent = '0';
      trailListEl.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-muted);font-size:0.85rem;">Nessuna traccia caricata.</div>';
      return;
    }

    function removeMarkers(gpxLayerGroup) {
      var toRemove = [];
      gpxLayerGroup.eachLayer(function(layer) {
        if (layer instanceof L.Marker) toRemove.push(layer);
      });
      toRemove.forEach(function(m) { gpxLayerGroup.removeLayer(m); });
    }

    TRAILS.forEach(function(t, i) {
      var color = t.color || PALETTE[i % PALETTE.length];

      var gpxLayer = new L.GPX(t.file, {
        async: true,
        polyline_options: {
          color: color,
          weight: 4,
          opacity: 0.85,
          lineCap: 'round',
        },
      });

      gpxLayer.on('loaded', function(e) {
        var gpx = e.target;

        removeMarkers(gpx);
        setTimeout(function() { removeMarkers(gpx); }, 100);
        setTimeout(function() { removeMarkers(gpx); }, 500);

        var trailName = t.name || gpx.get_name() || ('Traccia ' + (i + 1));
        var dist = gpx.get_distance();
        var elevG = gpx.get_elevation_gain();
        var elevL = gpx.get_elevation_loss();
        var bounds = gpx.getBounds();

        var elevData = [];
        var trackLayers = [];
        gpx.eachLayer(function(layer) {
          if (layer.getLatLngs) trackLayers.push(layer);
        });

        var cumDist = 0;
        trackLayers.forEach(function(tl) {
          var latlngs = tl.getLatLngs();
          var flat = Array.isArray(latlngs[0]) ? latlngs.flat() : latlngs;
          for (var j = 0; j < flat.length; j++) {
            if (j > 0) cumDist += flat[j].distanceTo(flat[j-1]);
            if (flat[j].alt !== undefined) {
              elevData.push({ dist: cumDist, alt: flat[j].alt });
            }
          }
        });

        layers[i] = {
          layer: gpx, name: trailName, color: color,
          distance: dist, elevGain: elevG, elevLoss: elevL,
          elevData: elevData, bounds: bounds,
          date: t.date || '', group: t.group || ''
        };
        loaded++;
        if (loaded === TRAILS.length) finishLoading();
      });

      gpxLayer.on('error', function() {
        console.warn('Could not load GPX:', t.file);
        loaded++;
        if (loaded === TRAILS.length) finishLoading();
      });

      gpxLayer.addTo(map);
    });

    function finishLoading() {
      var validLayers = layers.filter(Boolean);
      trailCountEl.textContent = validLayers.length;
      renderList(validLayers);

      // if (validLayers.length > 0) {
      //   var allBounds = L.latLngBounds([]);
      //   validLayers.forEach(function(l) {
      //     if (l.bounds && l.bounds.isValid()) allBounds.extend(l.bounds);
      //   });
      //   if (allBounds.isValid()) map.fitBounds(allBounds, { padding: [40, 40] });
      // }

      attachClickHandlers();

      map.on('click', function() { deselectAll(); });

      loader.classList.add('hidden');
    }

    function attachClickHandlers() {
      layers.forEach(function(trail, idx) {
        if (!trail) return;
        trail.layer.eachLayer(function(sub) {
          if (sub.on && sub.setStyle) {
            sub.on('click', function(e) {
              L.DomEvent.stopPropagation(e);

              activeIndex = idx;
              selectTrail(trail);
              renderList(layers.filter(Boolean));

              setTimeout(function() {
                var activeEl = document.querySelector('.trail-item.active');
                if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              }, 50);

              L.popup()
                .setLatLng(e.latlng)
                .setContent('<div class="popup-title">' + trail.name + '</div>')
                .openOn(map);
            });
          }
        });
      });
    }

    function renderList(items) {
      trailListEl.innerHTML = '';

      if (items.length === 0) {
        trailListEl.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-muted);font-size:0.85rem;">Nessun risultato.</div>';
        return;
      }

      items.forEach(function(trail) {
        if (!trail) return;
        var realIdx = layers.indexOf(trail);
        var distKm = (trail.distance / 1000).toFixed(1);
        var elevUp = Math.round(trail.elevGain);
        var elevDown = Math.round(trail.elevLoss);

        var el = document.createElement('div');
        el.className = 'trail-item' + (realIdx === activeIndex ? ' active' : '');
        el.innerHTML =
          '<div class="trail-color-dot" style="background:' + trail.color + '"></div>' +
          '<div class="trail-info">' +
            '<h3>' + trail.name + '</h3>' +
            '<div class="trail-meta">' +
              '<span>📏 ' + distKm + ' km</span>' +
              '<span>⬆ ' + elevUp + ' m</span>' +
            '</div>' +
            (trail.date || trail.group ? '<div class="trail-meta" style="margin-top:4px">' +
              (trail.date ? '<span>📅 ' + trail.date + '</span>' : '') +
              (trail.group ? '<span>👥 ' + trail.group + '</span>' : '') +
            '</div>' : '') +
          '</div>';

        el.addEventListener('click', function() {
          activeIndex = realIdx;
          selectTrail(trail);
          renderList(items);
          sidebar.classList.remove('open');
        });

        trailListEl.appendChild(el);
      });
    }

    function selectTrail(trail) {
      if (trail.bounds && trail.bounds.isValid()) {
        map.fitBounds(trail.bounds, { padding: [60, 60] });
      }
      trail.layer.bringToFront();
      if (trail.elevData && trail.elevData.length > 1) {
        showElevation(trail);
      }
    }

    function deselectAll() {
      activeIndex = -1;
      map.closePopup();
      elevPanel.classList.remove('visible');
      renderList(layers.filter(Boolean));
    }

    searchInput.addEventListener('input', function() {
      var q = searchInput.value.toLowerCase().trim();
      var filtered = layers.filter(function(l) {
        return l && l.name.toLowerCase().indexOf(q) !== -1;
      });
      renderList(filtered);
    });

    function showElevation(trail) {
      elevPanel.classList.add('visible');

      var canvas = elevCanvas;
      var ctx = canvas.getContext('2d');

      var rect = canvas.parentElement.getBoundingClientRect();
      var w = rect.width;
      var h = rect.height - 40;
      canvas.width = w * window.devicePixelRatio;
      canvas.height = h * window.devicePixelRatio;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

      var data = trail.elevData;
      var maxDist = data[data.length - 1].dist;
      var alts = data.map(function(d) { return d.alt; });
      var minAlt = Math.min.apply(null, alts) - 20;
      var maxAlt = Math.max.apply(null, alts) + 20;
      var altRange = maxAlt - minAlt || 1;

      var pad = { top: 10, right: 10, bottom: 24, left: 50 };
      var cw = w - pad.left - pad.right;
      var ch = h - pad.top - pad.bottom;

      ctx.clearRect(0, 0, w, h);

      ctx.strokeStyle = '#2a2e36';
      ctx.lineWidth = 0.5;
      ctx.font = '10px DM Sans';
      ctx.fillStyle = '#8a8d93';

      var nLines = 5;
      for (var i = 0; i <= nLines; i++) {
        var y = pad.top + (ch / nLines) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(w - pad.right, y);
        ctx.stroke();
        var altLabel = Math.round(maxAlt - (altRange / nLines) * i);
        ctx.fillText(altLabel + ' m', 4, y + 3);
      }

      var nDist = 5;
      for (var i = 0; i <= nDist; i++) {
        var x = pad.left + (cw / nDist) * i;
        var d = ((maxDist / nDist) * i / 1000).toFixed(1);
        ctx.fillText(d + ' km', x - 12, h - 4);
      }

      var gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
      gradient.addColorStop(0, trail.color + '55');
      gradient.addColorStop(1, trail.color + '05');

      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top + ch);
      data.forEach(function(d) {
        var x = pad.left + (d.dist / maxDist) * cw;
        var y = pad.top + ch - ((d.alt - minAlt) / altRange) * ch;
        ctx.lineTo(x, y);
      });
      ctx.lineTo(pad.left + cw, pad.top + ch);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      ctx.beginPath();
      data.forEach(function(d, j) {
        var x = pad.left + (d.dist / maxDist) * cw;
        var y = pad.top + ch - ((d.alt - minAlt) / altRange) * ch;
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = trail.color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    elevClose.addEventListener('click', function() { deselectAll(); });

  })();
  </script>
</body>
</html>
