<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escursioni — Davide</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet GPX plugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/2.1.2/gpx.min.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f1114;
      --surface: #181b20;
      --surface-hover: #22262d;
      --border: #2a2e36;
      --text: #e8e6e1;
      --text-muted: #8a8d93;
      --accent: #e8a838;
      --accent-dim: rgba(232,168,56,0.15);
      --trail-color: #ff5533;
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ---- LAYOUT ---- */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ---- SIDEBAR ---- */
    .sidebar {
      width: 380px;
      min-width: 380px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
    }

    .sidebar-header {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 800;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 4px;
    }

    .sidebar-header .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .trail-count {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .sidebar-search {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-search input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .sidebar-search input::placeholder { color: var(--text-muted); }
    .sidebar-search input:focus { border-color: var(--accent); }

    .trail-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }

    .trail-list::-webkit-scrollbar { width: 4px; }
    .trail-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .trail-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid transparent;
    }

    .trail-item:hover, .trail-item.active {
      background: var(--surface-hover);
    }

    .trail-item.active {
      border-left: 3px solid var(--accent);
    }

    .trail-color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .trail-info h3 {
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .trail-meta {
      display: flex;
      gap: 14px;
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .trail-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      font-weight: 300;
    }

    .sidebar-footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ---- MAP ---- */
    .map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Style Leaflet popups */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-radius: var(--radius) !important;
      border: 1px solid var(--border) !important;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5) !important;
      font-family: 'DM Sans', sans-serif !important;
    }

    .leaflet-popup-tip {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
    }

    .leaflet-popup-content {
      margin: 14px 16px !important;
      font-size: 0.85rem !important;
    }

    .popup-title {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .popup-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      font-size: 0.78rem;
    }

    .popup-stats dt {
      color: var(--text-muted);
      font-weight: 300;
    }

    .popup-stats dd {
      font-weight: 500;
      color: var(--accent);
    }

    /* ---- MOBILE TOGGLE ---- */
    .sidebar-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1100;
      width: 44px;
      height: 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 1.3rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    /* ---- ELEVATION CHART ---- */
    .elevation-panel {
      display: none;
      position: fixed;
      bottom: 0;
      left: 380px;
      right: 0;
      height: 180px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 900;
      padding: 12px 20px;
    }

    .elevation-panel.visible { display: block; }

    .elevation-panel canvas {
      width: 100%;
      height: 100%;
    }

    .elevation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .elevation-header span {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .elevation-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
    }

    /* ---- LOADING ---- */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        transform: translateX(-100%);
        box-shadow: 8px 0 30px rgba(0,0,0,0.5);
      }

      .sidebar.open { transform: translateX(0); }

      .sidebar-toggle { display: flex; }

      .elevation-panel { left: 0; }
    }

    @media (max-width: 480px) {
      .sidebar {
        width: 100%;
        min-width: 100%;
      }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div class="loading-overlay" id="loader">
    <div class="loading-spinner"></div>
    <div class="loading-text">Caricamento tracce…</div>
  </div>

  <!-- Mobile sidebar toggle -->
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">☰</button>

  <div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Escursioni <span class="trail-count" id="trailCount">0</span></h1>
        <div class="subtitle">Le mie tracce GPX</div>
      </div>
      <div class="sidebar-search">
        <input type="text" placeholder="Cerca escursione…" id="searchInput" />
      </div>
      <div class="trail-list" id="trailList"></div>
      <div class="sidebar-footer">
        Powered by <a href="https://leafletjs.com" target="_blank">Leaflet</a> &amp; <a href="https://stadiamaps.com" target="_blank">Stadia Maps</a>
      </div>
    </aside>

    <!-- MAP -->
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <!-- Elevation panel -->
  <div class="elevation-panel" id="elevationPanel">
    <div class="elevation-header">
      <span>Profilo altimetrico</span>
      <button class="elevation-close" id="elevationClose">✕</button>
    </div>
    <canvas id="elevationCanvas"></canvas>
  </div>

  <script>
  // =================================================================
  //  CONFIGURATION — Add your GPX files here!
  // =================================================================
  //
  //  To add a new hike, simply:
  //  1. Drop your .gpx file into the "gpx/" folder
  //  2. Add an entry below with:
  //       - file:  path to your GPX file
  //       - name:  display name (optional — will use GPX metadata if blank)
  //       - color: trail color on the map (optional — auto-assigned if blank)
  //
  //  Example:
  //    { file: "gpx/my-new-hike.gpx", name: "Monte Grappa", color: "#22cc88" }
  //
  const TRAILS = [
    { file: "gpx/example-trail.gpx", name: "", color: "" },
    { file: "gpx/Alta_Via_Dolomiti_Bellunesi_1.gpx", name: "Alta Via Dolomiti Bellunesi - Parte 1", color: "#eee600" },
  ];

  // Color palette for auto-assigning trail colors
  const PALETTE = [
    "#ff5533", "#33bbff", "#44dd66", "#ffaa22", "#dd44ff",
    "#ff6699", "#22ddcc", "#ff3366", "#88aaff", "#ccdd33",
    "#ff8844", "#6677ff", "#33ff99", "#ff4488", "#aaddff",
  ];

  // =================================================================
  //  APP
  // =================================================================
  (function() {
    // ---- Map Setup ----
    const map = L.map('map', {
      center: [46.1, 11.8],
      zoom: 10,
      zoomControl: false,
    });

    // Stadia Alidade Satellite tiles
    L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_satellite/{z}/{x}/{y}{r}.jpg', {
      maxZoom: 20,
      attribution:
        '&copy; CNES, Distribution Airbus DS, &copy; Airbus DS, &copy; PlanetObserver (Contains Copernicus Data) ' +
        '| &copy; <a href="https://stadiamaps.com/">Stadia Maps</a> ' +
        '&copy; <a href="https://openmaptiles.org/">OpenMapTiles</a> ' +
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    }).addTo(map);

    // Zoom control — top right
    L.control.zoom({ position: 'topright' }).addTo(map);

    // ---- State ----
    const layers = [];       // { layer, name, color, distance, elevGain, elevLoss, elevData, bounds }
    let activeIndex = -1;

    const trailListEl = document.getElementById('trailList');
    const trailCountEl = document.getElementById('trailCount');
    const searchInput = document.getElementById('searchInput');
    const loader = document.getElementById('loader');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebar = document.getElementById('sidebar');
    const elevPanel = document.getElementById('elevationPanel');
    const elevCanvas = document.getElementById('elevationCanvas');
    const elevClose = document.getElementById('elevationClose');

    // ---- Mobile sidebar ----
    sidebarToggle.addEventListener('click', () => {
      sidebar.classList.toggle('open');
    });

    // ---- Load GPX files ----
    let loaded = 0;

    if (TRAILS.length === 0) {
      loader.classList.add('hidden');
      trailCountEl.textContent = '0';
      trailListEl.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-muted);font-size:0.85rem;">Nessuna traccia caricata.<br>Aggiungi file GPX nella configurazione.</div>';
      return;
    }

    TRAILS.forEach((t, i) => {
      const color = t.color || PALETTE[i % PALETTE.length];

      const gpxLayer = new L.GPX(t.file, {
        async: true,
        markers: {
          startIcon: null,
          endIcon: null,
          shadowUrl: null,
          wptIcons: {},
        },
        polyline_options: {
          color: color,
          weight: 4,
          opacity: 0.85,
          lineCap: 'round',
        },
      });

      gpxLayer.on('loaded', function(e) {
        const gpx = e.target;
        const name = t.name || gpx.get_name() || `Traccia ${i + 1}`;
        const dist = gpx.get_distance();       // meters
        const elevG = gpx.get_elevation_gain(); // meters
        const elevL = gpx.get_elevation_loss();
        const bounds = gpx.getBounds();

        // Build elevation data from the track points
        const elevData = [];
        const trackLayers = [];
        gpx.eachLayer(function(layer) {
          if (layer.getLatLngs) trackLayers.push(layer);
        });

        let cumDist = 0;
        trackLayers.forEach(tl => {
          const latlngs = tl.getLatLngs();
          // Handle nested arrays (multi-segment)
          const flat = Array.isArray(latlngs[0]) ? latlngs.flat() : latlngs;
          for (let j = 0; j < flat.length; j++) {
            if (j > 0) {
              cumDist += flat[j].distanceTo(flat[j-1]);
            }
            if (flat[j].alt !== undefined) {
              elevData.push({ dist: cumDist, alt: flat[j].alt });
            }
          }
        });

        layers[i] = { layer: gpx, name, color, distance: dist, elevGain: elevG, elevLoss: elevL, elevData, bounds };
        loaded++;

        if (loaded === TRAILS.length) {
          finishLoading();
        }
      });

      gpxLayer.on('error', function() {
        console.warn('Could not load GPX:', t.file);
        loaded++;
        if (loaded === TRAILS.length) finishLoading();
      });

      gpxLayer.addTo(map);
    });

    function finishLoading() {
      // Remove nulls from failed loads
      const validLayers = layers.filter(Boolean);
      trailCountEl.textContent = validLayers.length;
      renderList(validLayers);

      // Fit map to all trails
      if (validLayers.length > 0) {
        const allBounds = L.latLngBounds([]);
        validLayers.forEach(l => {
          if (l.bounds && l.bounds.isValid()) allBounds.extend(l.bounds);
        });
        if (allBounds.isValid()) map.fitBounds(allBounds, { padding: [40, 40] });
      }

      loader.classList.add('hidden');
    }

    // ---- Render trail list ----
    function renderList(items) {
      trailListEl.innerHTML = '';

      if (items.length === 0) {
        trailListEl.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-muted);font-size:0.85rem;">Nessun risultato.</div>';
        return;
      }

      items.forEach((trail, idx) => {
        if (!trail) return;
        const distKm = (trail.distance / 1000).toFixed(1);
        const elevUp = Math.round(trail.elevGain);
        const elevDown = Math.round(trail.elevLoss);

        const el = document.createElement('div');
        el.className = 'trail-item' + (idx === activeIndex ? ' active' : '');
        el.innerHTML = `
          <div class="trail-color-dot" style="background:${trail.color}"></div>
          <div class="trail-info">
            <h3>${trail.name}</h3>
            <div class="trail-meta">
              <span>📏 ${distKm} km</span>
              <span>⬆ ${elevUp} m</span>
              <span>⬇ ${elevDown} m</span>
            </div>
          </div>
        `;

        el.addEventListener('click', () => {
          activeIndex = idx;
          selectTrail(trail, idx);
          renderList(items);
          sidebar.classList.remove('open');
        });

        trailListEl.appendChild(el);
      });
    }

    // ---- Select a trail ----
    function selectTrail(trail, idx) {
      if (trail.bounds && trail.bounds.isValid()) {
        map.fitBounds(trail.bounds, { padding: [60, 60] });
      }

      // Highlight selected trail (bring to front, dim others)
      layers.forEach((l, j) => {
        if (!l) return;
        l.layer.eachLayer(sub => {
          if (sub.setStyle) {
            sub.setStyle({
              opacity: j === idx ? 1 : 0.3,
              weight: j === idx ? 5 : 3,
            });
          }
        });
        if (j === idx) l.layer.bringToFront();
      });

      // Show elevation chart
      if (trail.elevData && trail.elevData.length > 1) {
        showElevation(trail);
      }
    }

    // ---- Search ----
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase().trim();
      const filtered = layers.filter(l => l && l.name.toLowerCase().includes(q));
      renderList(filtered);
    });

    // ---- Elevation profile (simple canvas chart) ----
    function showElevation(trail) {
      elevPanel.classList.add('visible');

      const canvas = elevCanvas;
      const ctx = canvas.getContext('2d');

      // Set canvas resolution
      const rect = canvas.parentElement.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height - 40;
      canvas.width = w * window.devicePixelRatio;
      canvas.height = h * window.devicePixelRatio;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

      const data = trail.elevData;
      const maxDist = data[data.length - 1].dist;
      const alts = data.map(d => d.alt);
      const minAlt = Math.min(...alts) - 20;
      const maxAlt = Math.max(...alts) + 20;
      const altRange = maxAlt - minAlt || 1;

      const pad = { top: 10, right: 10, bottom: 24, left: 50 };
      const cw = w - pad.left - pad.right;
      const ch = h - pad.top - pad.bottom;

      ctx.clearRect(0, 0, w, h);

      // Grid lines
      ctx.strokeStyle = '#2a2e36';
      ctx.lineWidth = 0.5;
      ctx.font = '10px DM Sans';
      ctx.fillStyle = '#8a8d93';

      const nLines = 5;
      for (let i = 0; i <= nLines; i++) {
        const y = pad.top + (ch / nLines) * i;
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(w - pad.right, y);
        ctx.stroke();
        const alt = Math.round(maxAlt - (altRange / nLines) * i);
        ctx.fillText(alt + ' m', 4, y + 3);
      }

      // Distance labels
      const nDist = 5;
      for (let i = 0; i <= nDist; i++) {
        const x = pad.left + (cw / nDist) * i;
        const d = ((maxDist / nDist) * i / 1000).toFixed(1);
        ctx.fillText(d + ' km', x - 12, h - 4);
      }

      // Fill gradient
      const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
      gradient.addColorStop(0, trail.color + '55');
      gradient.addColorStop(1, trail.color + '05');

      ctx.beginPath();
      ctx.moveTo(pad.left, pad.top + ch);

      data.forEach((d, j) => {
        const x = pad.left + (d.dist / maxDist) * cw;
        const y = pad.top + ch - ((d.alt - minAlt) / altRange) * ch;
        if (j === 0) ctx.lineTo(x, y);
        else ctx.lineTo(x, y);
      });

      ctx.lineTo(pad.left + cw, pad.top + ch);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Line
      ctx.beginPath();
      data.forEach((d, j) => {
        const x = pad.left + (d.dist / maxDist) * cw;
        const y = pad.top + ch - ((d.alt - minAlt) / altRange) * ch;
        if (j === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = trail.color;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    elevClose.addEventListener('click', () => {
      elevPanel.classList.remove('visible');
      // Restore all trails opacity
      layers.forEach(l => {
        if (!l) return;
        l.layer.eachLayer(sub => {
          if (sub.setStyle) sub.setStyle({ opacity: 0.85, weight: 4 });
        });
      });
      activeIndex = -1;
      renderList(layers.filter(Boolean));
    });

    // Click on trail line on map → select it
    map.on('layeradd', () => {
      layers.forEach((trail, idx) => {
        if (!trail) return;
        trail.layer.eachLayer(sub => {
          if (sub.on && sub.setStyle) {
            sub.off('click');
            sub.on('click', () => {
              activeIndex = idx;
              selectTrail(trail, idx);
              renderList(layers.filter(Boolean));

              // Popup
              const distKm = (trail.distance / 1000).toFixed(1);
              const popup = L.popup()
                .setLatLng(sub.getLatLngs ? sub.getCenter() : sub.getLatLng())
                .setContent(`
                  <div class="popup-title">${trail.name}</div>
                  <dl class="popup-stats">
                    <dt>Distanza</dt><dd>${distKm} km</dd>
                    <dt>Dislivello ↑</dt><dd>${Math.round(trail.elevGain)} m</dd>
                    <dt>Dislivello ↓</dt><dd>${Math.round(trail.elevLoss)} m</dd>
                  </dl>
                `)
                .openOn(map);
            });
          }
        });
      });
    });

  })();
  </script>
</body>
</html>
